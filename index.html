<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalkanTV Premium</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* POČETNI EKRAN */
        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 80%; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; outline: none; }
        .card:hover, .card:focus { background: var(--primary); transform: translateY(-10px); border-color: white; }
        .card h2 { margin: 10px 0 0; font-size: 1.5rem; }

        /* PLAYER EKRAN */
        #player-screen { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        video { width: 100%; height: 100%; }
        
        /* BOČNA LISTA */
        #side-menu { position: absolute; top: 0; left: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.9); transform: translateX(-100%); transition: 0.3s; z-index: 10; overflow-y: auto; padding: 15px; border-right: 2px solid var(--primary); }
        #side-menu.active { transform: translateX(0); }
        .channel-item { padding: 12px; margin-bottom: 5px; background: #111; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .channel-item:hover { background: var(--primary); }

        #status-msg { position: absolute; top: 10px; right: 10px; font-size: 12px; color: var(--primary); }
    </style>
</head>
<body>

    <!-- POČETNI EKRAN -->
    <div id="home-screen">
        <h1 style="font-size: 3rem; margin-bottom: 50px; letter-spacing: 2px;">BALKAN <span style="color:var(--primary)">TV</span></h1>
        <div class="menu-grid">
            <div class="card" tabindex="1" onclick="showPlayer()">
                <div style="font-size: 50px;">📺</div>
                <h2>UŽIVO TV</h2>
            </div>
            <div class="card" tabindex="2">
                <div style="font-size: 50px;">🎬</div>
                <h2>FILMOVI</h2>
            </div>
            <div class="card" tabindex="3">
                <div style="font-size: 50px;">🍿</div>
                <h2>SERIJE</h2>
            </div>
        </div>
        <p style="margin-top: 40px; opacity: 0.5;">Pritisnite OK za ulaz • Korisnik: vedoprivat123</p>
    </div>

    <!-- PLAYER EKRAN -->
    <div id="player-screen">
        <div id="status-msg">Pritisni OK za listu kanala</div>
        <div id="side-menu">
            <h3 style="color:var(--primary)">Kanali</h3>
            <div id="channel-list">Učitavam...</div>
        </div>
        <video id="main-video" controls autoplay></video>
    </div>

<script>
    const homeScreen = document.getElementById('home-screen');
    const playerScreen = document.getElementById('player-screen');
    const channelList = document.getElementById('channel-list');
    const video = document.getElementById('main-video');
    const sideMenu = document.getElementById('side-menu');

    const m3uUrl = "http://balkantv.net";

    // Funkcija za prelazak na player
    function showPlayer() {
        homeScreen.style.display = 'none';
        playerScreen.style.display = 'block';
        fetchChannels();
    }

    async function fetchChannels() {
        try {
            const res = await fetch("https://corsproxy.io?" + encodeURIComponent(m3uUrl));
            const data = await res.text();
            parseM3U(data);
        } catch (e) {
            channelList.innerHTML = "Greška pri učitavanju.";
        }
    }

    function parseM3U(data) {
        channelList.innerHTML = "";
        const lines = data.split('\n');
        lines.forEach((line, i) => {
            if (line.includes('#EXTINF')) {
                const name = line.split(',').pop();
                const url = lines[i+1]?.trim();
                if (url && url.startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerText = name;
                    div.onclick = () => playStream(url);
                    channelList.appendChild(div);
                }
            }
        });
    }

    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
        sideMenu.classList.remove('active');
    }

    // Navigacija tipkama
    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 13) { // Enter / OK
            if (playerScreen.style.display === 'block') {
                sideMenu.classList.toggle('active');
            }
        }
        if (e.keyCode === 27 || e.keyCode === 8) { // Esc ili Back
            if (sideMenu.classList.contains('active')) {
                sideMenu.classList.remove('active');
            } else if (playerScreen.style.display === 'block') {
                playerScreen.style.display = 'none';
                homeScreen.style.display = 'flex';
                video.pause();
            }
        }
    });

    // Fokusiraj prvu karticu na početku
    document.querySelector('.card').focus();
</script>
</body>
</html>

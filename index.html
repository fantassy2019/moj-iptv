<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalkanTV Premium Player</title>
    <!-- Biblioteka za video stream -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --red: #d32f2f; --bg: #0a0e1a; --card: #16213e; --input: #0f3460; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; }
        
        /* 1. LOGIN EKRAN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #1a1a2e 0%, #0a0e1a 100%); }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .login-box h2 { color: var(--red); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: var(--input); color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border: 1px solid var(--red); }
        .btn-login { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-login:hover { background: #ff1744; transform: scale(1.02); }

        /* 2. DASHBOARD (GRID) */
        #dashboard { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .logo { font-size: 3.5rem; font-weight: bold; margin-bottom: 50px; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        .logo span { color: var(--red); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 85%; max-width: 1100px; }
        .card { background: linear-gradient(145deg, #16213e, #0f3460); padding: 50px 20px; border-radius: 25px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; outline: none; }
        .card:focus, .card:hover { border-color: var(--red); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(211, 47, 47, 0.3); }
        .card i { font-size: 55px; display: block; margin-bottom: 15px; }
        .card h2 { margin: 0; font-size: 1.6rem; text-transform: uppercase; }

        /* 3. PLAYER EKRAN */
        #player-screen { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; background: #000; }
        #side-list { position: absolute; left: 0; top: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.95); transform: translateX(-100%); transition: 0.3s; padding: 20px; overflow-y: auto; z-index: 100; border-right: 3px solid var(--red); box-sizing: border-box; }
        #side-list.active { transform: translateX(0); }
        .channel-item { padding: 12px; margin-bottom: 6px; background: #1a1a1a; cursor: pointer; border-radius: 8px; font-size: 15px; border-left: 4px solid transparent; }
        .channel-item:hover { background: var(--red); border-left: 4px solid white; }
        #loader-msg { color: var(--red); text-align: center; margin-top: 20px; }

        /* POMOĆNE KLASE */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. EKRAN ZA PRIJAVU -->
    <div id="login-screen">
        <div class="login-box">
            <h2>BalkanTV Login</h2>
            <input type="text" id="host" placeholder="Host (npr. http://balkantv.net:25461)" value="http://balkantv.net:25461">
            <input type="text" id="user" placeholder="Korisničko ime">
            <input type="password" id="pass" placeholder="Lozinka">
            <button class="btn-login" onclick="handleLogin()">PRIJAVI SE</button>
        </div>
    </div>

    <!-- 2. GLAVNI IZBORNIK (DASHBOARD) -->
    <div id="dashboard">
        <div class="logo">BALKAN <span>TV</span></div>
        <div class="grid">
            <div class="card" tabindex="1" onclick="startLive()">
                <div style="font-size: 50px;">📺</div>
                <h2>LIVE TV</h2>
            </div>
            <div class="card" tabindex="2">
                <div style="font-size: 50px;">🎬</div>
                <h2>MOVIES</h2>
            </div>
            <div class="card" tabindex="3">
                <div style="font-size: 50px;">🍿</div>
                <h2>SERIES</h2>
            </div>
        </div>
        <button onclick="handleLogout()" style="margin-top: 50px; background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">ODJAVI SE</button>
    </div>

    <!-- 3. VIDEO PLAYER EKRAN -->
    <div id="player-screen">
        <div id="side-list">
            <h3 style="color: var(--red); border-bottom: 1px solid #333; padding-bottom: 10px;">LISTA KANALA</h3>
            <div id="channel-container"><div id="loader-msg">Učitavam...</div></div>
        </div>
        <video id="main-video" controls autoplay></video>
    </div>

<script>
    const loginScreen = document.getElementById('login-screen');
    const dashboard = document.getElementById('dashboard');
    const playerScreen = document.getElementById('player-screen');
    const video = document.getElementById('main-video');
    const sideList = document.getElementById('side-list');
    const channelContainer = document.getElementById('channel-container');

    let userConfig = JSON.parse(localStorage.getItem('iptv_session'));

    // Inicijalna provjera
    if (userConfig) {
        showDashboard();
    }

    function handleLogin() {
        const h = document.getElementById('host').value.trim().replace(/\/$/, "");
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();

        if (h && u && p) {
            userConfig = { host: h, user: u, pass: p };
            localStorage.setItem('iptv_session', JSON.stringify(userConfig));
            showDashboard();
        } else {
            alert("Molimo popunite sva polja!");
        }
    }

    function showDashboard() {
        loginScreen.style.display = 'none';
        dashboard.style.display = 'flex';
        document.querySelector('.card').focus(); // Fokusira prvu karticu za TV
    }

    function handleLogout() {
        localStorage.removeItem('iptv_session');
        location.reload();
    }

    function startLive() {
        dashboard.style.display = 'none';
        playerScreen.style.display = 'block';
        loadPlaylist();
    }

    async function loadPlaylist() {
        channelContainer.innerHTML = '<div id="loader-msg">Učitavam listu... Molimo pričekajte.</div>';
        
        const fullUrl = `${userConfig.host}/get.php?username=${userConfig.user}&password=${userConfig.pass}&type=m3u_plus&output=m3u8`;
        // Koristimo pouzdan proxy za laptop
        const proxy = "https://allorigins.win";

        try {
            const response = await fetch(proxy + encodeURIComponent(fullUrl));
            if (!response.ok) throw new Error();
            const text = await response.text();
            
            if (text.includes('#EXTM3U')) {
                renderChannels(text);
            } else {
                channelContainer.innerHTML = '<div style="color:yellow; padding:20px;">Podaci nisu ispravni ili je lista prazna.</div>';
            }
        } catch (err) {
            channelContainer.innerHTML = '<div style="color:red; padding:20px;">CORS Greška! Na laptopu uključite "Allow CORS" dodatak. Na Smart TV-u bi trebalo raditi direktno.</div>';
        }
    }

    function renderChannels(data) {
        channelContainer.innerHTML = "";
        const lines = data.split('\n');
        
        lines.forEach((line, i) => {
            if (line.includes('#EXTINF')) {
                const name = line.split(',').pop().trim();
                const url = lines[i+1]?.trim();
                
                if (url && url.startsWith('http')) {
                    const item = document.createElement('div');
                    item.className = 'channel-item';
                    item.innerText = name;
                    item.onclick = () => {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                        } else {
                            video.src = url;
                            video.play();
                        }
                        sideList.classList.remove('active');
                    };
                    channelContainer.appendChild(item);
                }
            }
        });
    }

    // Navigacija tipkama (TV Daljinski)
    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 13) { // OK / Enter
            if (playerScreen.style.display === 'block') {
                sideList.classList.toggle('active');
            }
        }
        if (e.keyCode === 27 || e.keyCode === 8) { // Back / Esc
            if (sideList.classList.contains('active')) {
                sideList.classList.remove('active');
            } else if (playerScreen.style.display === 'block') {
                playerScreen.style.display = 'none';
                dashboard.style.display = 'flex';
                video.pause();
            }
        }
    });
</script>
</body>
</html>

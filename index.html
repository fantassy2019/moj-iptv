<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Player</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #menu { position: absolute; top: 0; left: 0; width: 320px; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 20px; transform: translateX(-100%); transition: 0.3s; border-right: 2px solid red; }
        #menu.active { transform: translateX(0); }
        .kanal { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; background: #111; margin-bottom: 5px; border-radius: 4px; }
        .kanal:hover { background: red; }
        video { width: 100vw; height: 100vh; background: #000; }
        #status { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div id="status">Pritisni OK za kanale</div>
<div id="menu"><h2>Lista Kanala</h2><div id="lista">Učitavam...</div></div>
<video id="video" controls autoplay></video>

<script>
    const video = document.getElementById('video');
    const listaDiv = document.getElementById('lista');
    const statusDiv = document.getElementById('status');
    
    // VAŠ LINK (Sada koristimo m3u8 umjesto mpegts jer ga preglednici bolje podržavaju)
    const mojLink = "http://balkantv.net";

    async function ucitajListu() {
        try {
            statusDiv.innerText = "Pokušavam dohvatiti listu...";
            const response = await fetch(mojLink);
            
            if (!response.ok) throw new Error('Server ne odgovara');
            
            const data = await response.text();
            if (data.includes('#EXTM3U')) {
                parsiraj(data);
                statusDiv.innerText = "Lista učitana! Pritisni OK.";
            } else {
                statusDiv.innerText = "Server vratio praznu listu ili grešku.";
            }
        } catch (err) {
            console.error(err);
            statusDiv.innerHTML = "<b>CORS BLOKADA!</b><br>Vaš laptop blokira pristup.<br>Pokušajte otvoriti na Smart TV-u.";
            listaDiv.innerHTML = "<p style='color:orange'>Ako ste na laptopu, instalirajte 'Allow CORS' dodatak u Chromeu ili pokušajte otvoriti stranicu na TV-u.</p>";
        }
    }

    function parsiraj(data) {
        listaDiv.innerHTML = "";
        const linije = data.split('\n');
        linije.forEach((linija, i) => {
            if (linija.startsWith('#EXTINF')) {
                const ime = linija.split(',').pop();
                const url = linije[i+1]?.trim();
                if (url && url.startsWith('http')) {
                    const d = document.createElement('div');
                    d.className = 'kanal';
                    d.innerText = ime;
                    d.onclick = () => {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else { video.src = url; }
                        document.getElementById('menu').classList.remove('active');
                    };
                    listaDiv.appendChild(d);
                }
            }
        });
    }

    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 13) document.getElementById('menu').classList.toggle('active');
    });

    ucitajListu();
</script>
</body>
</html>

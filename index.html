<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Modern UI</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        .container { text-align: center; width: 90%; }
        
        .header { margin-bottom: 50px; }
        .header h1 { font-size: 3em; margin: 0; color: #e94560; text-transform: uppercase; letter-spacing: 3px; }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        /* Efekt kad se pređe daljinskim ili mišem */
        .card:hover, .card:focus {
            background: #e94560;
            transform: translateY(-10px);
            border-color: white;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.5);
            outline: none;
        }

        .card i { font-size: 50px; display: block; margin-bottom: 20px; }
        .card h2 { margin: 0; font-size: 1.5em; }

        #status-bar { position: absolute; bottom: 20px; font-size: 0.9em; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Balkan TV</h1>
        <p>Odaberite kategoriju</p>
    </div>

    <div class="menu-grid">
        <!-- LIVE TV -->
        <a href="#" class="card" id="live-btn" onclick="otvoriPlayer()">
            <div style="font-size: 40px;">📺</div>
            <h2>UŽIVO TV</h2>
        </a>

        <!-- FILMOVI -->
        <a href="#" class="card">
            <div style="font-size: 40px;">🎬</div>
            <h2>FILMOVI</h2>
        </a>

        <!-- SERIJE -->
        <a href="#" class="card">
            <div style="font-size: 40px;">🍿</div>
            <h2>SERIJE</h2>
        </a>
    </div>

    <div id="status-bar">Korisnik: vedoprivat123 | Status: Aktivan</div>
</div>

<script>
    // Funkcija koja će kasnije otvarati tvoj player s kanalima
    function otvoriPlayer() {
        alert("Pokrećem učitavanje kanala...");
        // Ovdje ćemo povezati tvoj stari kod za listu
    }

    // Dodatak za daljinski: navigacija strelicama
    document.addEventListener('keydown', (e) => {
        const cards = document.querySelectorAll('.card');
        let current = document.activeElement;
        // Jednostavna logika za fokusiranje prve kartice na početku
        if (!current || current === document.body) {
            cards[0].focus();
        }
    });
</script>

</body>
</html>

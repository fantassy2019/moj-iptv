<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Login</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --red: #d32f2f; --bg: #0a0e1a; --card: #16213e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* LOGIN EKRAN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #ff1744; }

        /* DASHBOARD (Tvoj stari Grid) */
        #dashboard { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 80%; }
        .card { background: var(--card); padding: 50px 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .card:focus, .card:hover { border-color: var(--red); transform: scale(1.05); outline: none; }

        /* PLAYER */
        #player-screen { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; }
        #side-list { position: absolute; left: 0; top: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.9); transform: translateX(-100%); transition: 0.3s; padding: 20px; overflow-y: auto; z-index: 100; border-right: 2px solid var(--red); }
        #side-list.active { transform: translateX(0); }
        .channel { padding: 10px; margin-bottom: 5px; background: #111; cursor: pointer; border-radius: 5px; }
        .channel:hover { background: var(--red); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="text-align:center">IPTV LOGIN</h2>
            <input type="text" id="host" placeholder="Host (npr. http://balkantv.net:25461)">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()">PRIJAVI SE</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <h1 id="welcome-msg" style="margin-bottom:40px">BALKAN <span>TV</span></h1>
        <div class="grid">
            <div class="card" tabindex="1" onclick="startLive()"><h2>LIVE TV</h2></div>
            <div class="card" tabindex="2"><h2>MOVIES</h2></div>
            <div class="card" tabindex="3"><h2>SERIES</h2></div>
        </div>
        <button onclick="logout()" style="width:150px; margin-top:50px; background:#444">Odjavi se</button>
    </div>

    <!-- PLAYER -->
    <div id="player-screen">
        <div id="side-list"><h3>KANALI</h3><div id="channels"></div></div>
        <video id="vid" controls autoplay></video>
    </div>

<script>
    let userData = JSON.parse(localStorage.getItem('iptv_user'));

    if(userData) {
        showDashboard();
    }

    function login() {
        const data = {
            host: document.getElementById('host').value,
            user: document.getElementById('user').value,
            pass: document.getElementById('pass').value
        };
        if(data.host && data.user && data.pass) {
            localStorage.setItem('iptv_user', JSON.stringify(data));
            userData = data;
            showDashboard();
        } else { alert("Popunite sva polja!"); }
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
    }

    function logout() {
        localStorage.removeItem('iptv_user');
        location.reload();
    }

    function startLive() {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        loadM3U();
    }

    async function loadM3U() {
        const fullUrl = `${userData.host}/get.php?username=${userData.user}&password=${userData.pass}&type=m3u_plus&output=m3u8`;
        const proxy = "https://allorigins.win";
        
        try {
            const res = await fetch(proxy + encodeURIComponent(fullUrl));
            const text = await res.text();
            parse(text);
        } catch (e) { alert("Greška pri učitavanju liste."); }
    }

    function parse(data) {
        const container = document.getElementById('channels');
        container.innerHTML = "";
        const lines = data.split('\n');
        lines.forEach((line, i) => {
            if (line.includes('#EXTINF')) {
                const name = line.split(',').pop();
                const url = lines[i+1]?.trim();
                const div = document.createElement('div');
                div.className = 'channel';
                div.innerText = name;
                div.onclick = () => {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(document.getElementById('vid'));
                    }
                    document.getElementById('side-list').classList.remove('active');
                };
                container.appendChild(div);
            }
        });
    }

    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 13) document.getElementById('side-list').classList.toggle('active');
        if (e.keyCode === 27) location.reload(); // Back vraća na početak
    });
</script>
</body>
</html>

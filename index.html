<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Direct</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        .btn { background: red; color: white; padding: 20px; border: none; cursor: pointer; font-size: 20px; border-radius: 10px; }
        #list { margin-top: 20px; display: none; background: #111; padding: 20px; }
        .ch { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="main">
    <h1>BALKAN TV</h1>
    <button class="btn" onclick="prikaziKanale()">UČITAJ MOJE KANALE</button>
</div>

<div id="list">
    <h3>Lista kanala:</h3>
    <div id="items">Povezivanje...</div>
</div>

<video id="v" controls style="width:100%; height:80vh; display:none;"></video>

<script>
    function prikaziKanale() {
        document.getElementById('main').style.display = 'none';
        document.getElementById('list').style.display = 'block';
        
        // Koristimo drugi tip proxy-ja koji često prolazi tamo gde drugi ne mogu
        const link = "http://balkantv.net:25461/get.php?username=vedoprivat123&password=Pk26jxo95yoeM93&type=m3u_plus&output=mpegts";
        const proxy = "https://allorigins.win";

        fetch(proxy + encodeURIComponent(link))
            .then(r => r.text())
            .then(data => {
                const lines = data.split('\n');
                let html = "";
                lines.forEach((line, i) => {
                    if(line.includes('#EXTINF')) {
                        const name = line.split(',').pop();
                        const url = lines[i+1]?.trim();
                        html += `<div class="ch" onclick="pusti('${url}')">${name}</div>`;
                    }
                });
                document.getElementById('items').innerHTML = html;
            })
            .catch(e => {
                document.getElementById('items').innerHTML = "SERVER BLOKIRA PRISTUP. Probajte preko mobilnog interneta (hotspot).";
            });
    }

    function pusti(url) {
        const video = document.getElementById('v');
        document.getElementById('list').style.display = 'none';
        video.style.display = 'block';
        video.src = url;
        video.play();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Player</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        #menu { position: absolute; top: 0; left: 0; width: 300px; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 10px; transform: translateX(-100%); transition: 0.3s; }
        #menu.active { transform: translateX(0); }
        .kanal { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; background: #111; margin-bottom: 2px; }
        .kanal:hover { background: #ed1c24; }
        video { width: 100vw; height: 100vh; background: #000; }
        #upute { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="upute">Pritisni ENTER/OK za listu</div>
<div id="menu"><h2>Kanali</h2><div id="lista">Učitavam...</div></div>
<video id="video" controls autoplay></video>

<script>
    const video = document.getElementById('video');
    const listaDiv = document.getElementById('lista');
    
    // KORISTIMO PROXY DA ZAOBIĐEMO BLOKADU
    const proxy = "https://herokuapp.com";
    const mojLink = "http://balkantv.net";

    async function dohvatiListu() {
        try {
            // Prvo pokušavamo direktno, ako ne radi, javi grešku
            const res = await fetch(mojLink);
            const data = await res.text();
            parsiraj(data);
        } catch (e) {
            listaDiv.innerHTML = "Problem s povezivanjem. Provjerite link ili CORS.";
        }
    }

    function parsiraj(data) {
        listaDiv.innerHTML = "";
        const linije = data.split('\n');
        for (let i = 0; i < linije.length; i++) {
            if (linije[i].includes('#EXTINF')) {
                const ime = linije[i].split(',')[1] || "Kanal";
                const url = linije[i+1].trim();
                const d = document.createElement('div');
                d.className = 'kanal';
                d.innerText = ime;
                d.onclick = () => {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                    } else {
                        video.src = url;
                    }
                    document.getElementById('menu').classList.remove('active');
                };
                listaDiv.appendChild(d);
            }
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 13) document.getElementById('menu').classList.toggle('active');
    });

    dohvatiListu();
</script>
</body>
</html>

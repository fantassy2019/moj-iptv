<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>BalkanTV Test</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #0a0e1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 50px; }
        .card { background: #16213e; padding: 40px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; }
        .card:focus, .card:hover { border-color: #d32f2f; background: #d32f2f; }
        #player-wrap { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; }
        #back-btn { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home">
        <h1>BALKAN TV - TEST</h1>
        <p>Ako server ne radi, testiramo ručne kanale:</p>
        <div class="grid">
            <div class="card" tabindex="1" onclick="play('1')"><h2>KANAL 1</h2></div>
            <div class="card" tabindex="2" onclick="play('2')"><h2>KANAL 2</h2></div>
            <div class="card" tabindex="3" onclick="play('3')"><h2>KANAL 3</h2></div>
        </div>
    </div>

    <div id="player-wrap">
        <button id="back-btn" onclick="zatvori()">X ZATVORI (ESC)</button>
        <video id="video" controls autoplay></video>
    </div>

<script>
    const v = document.getElementById('video');
    const h = document.getElementById('home');
    const p = document.getElementById('player-wrap');

    // RUČNO SASTAVLJENI LINKOVI (direktni linkovi na kanale)
    const kanali = {
        '1': "http://balkantv.net:25461/get.php?username=vedoprivat123&password=Pk26jxo95yoeM93&type=m3u_plus&output=m3u8",
        '2': "http://balkantv.net",
        '3': "http://balkantv.net"
    };

    function play(id) {
        h.style.display = 'none';
        p.style.display = 'block';
        const url = kanali[id];

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        } else {
            v.src = url;
        }
    }

    function zatvori() {
        p.style.display = 'none';
        h.style.display = 'block';
        v.pause();
    }

    document.addEventListener('keydown', (e) => {
        if (e.keyCode === 27 || e.keyCode === 8) zatvori();
    });
</script>
</body>
</html>
